---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adguard1
  namespace: network
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`adguard1.${CLUSTER_DOMAIN}`)
      kind: Rule
      middlewares:
        - name: basic-auth
      services:
        - name: adguard1
          port: 80
  tls: {}
