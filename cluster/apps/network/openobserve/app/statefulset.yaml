---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openobserve
  namespace: network
  labels:
    name: openobserve
spec:
  serviceName: openobserve
  replicas: 1
  selector:
    matchLabels:
      name: openobserve
      app: openobserve
  template:
    metadata:
      labels:
        name: openobserve
        app: openobserve
    spec:
      securityContext:
        fsGroup: 2000
        runAsUser: 10000
        runAsGroup: 3000
        runAsNonRoot: true
      containers:
        - name: openobserve
          # renovate: depName=openobserve/openobserve datasource=github-releases
          image: o2cr.ai/openobserve/openobserve:v0.70.3
          env:
            - name: ZO_ROOT_USER_EMAIL
              value: "${ZO_ROOT_USER_EMAIL}"
            - name: ZO_ROOT_USER_PASSWORD
              value: "${ZO_ROOT_USER_PASSWORD}"
            - name: ZO_DATA_DIR
              value: /data
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 4096m
              memory: 2048Mi
            requests:
              cpu: 256m
              memory: 50Mi
          ports:
            - containerPort: 5080
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi