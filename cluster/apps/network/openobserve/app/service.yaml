---
apiVersion: v1
kind: Service
metadata:
  name: openobserve
  namespace: network
spec:
  clusterIP: None
  selector:
    app: openobserve
  ports:
    - name: http
      port: 5080
      targetPort: 5080

---
apiVersion: v1
kind: Service
metadata:
  name: openobserve-lb
  namespace: network
  annotations:
    metallb.universe.tf/address-pool: "${METALLB_POOL_HOME}"
    metallb.universe.tf/loadBalancerIPs: "${OPENOBSERVE_LB_IP}"
spec:
  type: LoadBalancer
  selector:
    app: openobserve
  ports:
    - name: http
      port: 5080
      targetPort: 5080