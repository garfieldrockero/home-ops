---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-sockpuppet
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser-sockpuppet
  template:
    metadata:
      labels:
        app: browser-sockpuppet
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.homelab/cpu-tier
                    operator: In
                    values:
                      - high
      containers:
        - name: browser
          # renovate: depName=dgtlmoon/sockpuppetbrowser datasource=docker
          image: dgtlmoon/sockpuppetbrowser:0.0.3@sha256:23a7be698216407648b6c78fc55de0411bde550635edc30347373c86a5176fad
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
            allowPrivilegeEscalation: false
          env:
            - name: SCREEN_WIDTH
              value: "1920"
            - name: SCREEN_HEIGHT
              value: "1080"
            - name: SCREEN_DEPTH
              value: "16"
            - name: MAX_CONCURRENT_CHROME_PROCESSES
              value: "10"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 4Gi
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
            - name: home-chrome
              mountPath: /home/chrome
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /stats
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: home-chrome
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: browser-sockpuppet
  namespace: tools
spec:
  selector:
    app: browser-sockpuppet
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sockpuppetbrowser-netpol
  namespace: tools
spec:
  podSelector:
    matchLabels:
      app: browser-sockpuppet
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: changedetection
      ports:
        - port: 3000
  egress:
    - {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: changedetection
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: changedetection
  template:
    metadata:
      labels:
        app: changedetection
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.homelab/cpu-tier
                    operator: In
                    values:
                      - high
      containers:
        - name: changedetection
          # renovate: depName=ghcr.io/dgtlmoon/changedetection.io datasource=docker
          image: ghcr.io/dgtlmoon/changedetection.io:0.54.8@sha256:45a90dd17a4012ce3046b246ff100f001f9e09a8114db496d6ed64ae3c8db2e9
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: PLAYWRIGHT_DRIVER_URL
              value: "ws://browser-sockpuppet:3000/?stealth=1&headful=true&--window-size=1920,1080"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /datastore
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: changedetection-data
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: changedetection
  namespace: tools
  annotations:
    metallb.universe.tf/address-pool: "${METALLB_POOL_HOME}"
    metallb.universe.tf/loadBalancerIPs: "${CHANGEDETECTION_LB_IP}"
spec:
  type: LoadBalancer
  selector:
    app: changedetection
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: changedetection-netpol
  namespace: tools
spec:
  podSelector:
    matchLabels:
      app: changedetection
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 5000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: browser-sockpuppet
      ports:
        - port: 3000
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 80
        - port: 443
