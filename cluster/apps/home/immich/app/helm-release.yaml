---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: home
spec:
  interval: 5m
  chart:
    spec:
      chart: immich
      version: "0.11.1"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Service
              name: immich-server
            patch: |
              - op: replace
                path: /spec/type
                value: LoadBalancer
              - op: add
                path: /metadata/annotations/metallb.io~1address-pool
                value: "${METALLB_POOL_HOME}"
              - op: add
                path: /metadata/annotations/metallb.io~1loadBalancerIPs
                value: "${IMMICH_LB_IP}"
  values:
    # Versión compartida entre server y machine-learning (deben ser iguales)
    controllers:
      main:
        containers:
          main:
            # renovate: depName=ghcr.io/immich-app/immich-server datasource=docker
            image:
              tag: "v2.6.3"
            env:
              DB_HOSTNAME: "immich-postgres-rw"
              DB_PORT: "5432"
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-secrets
                    key: DB_DATABASE_NAME
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-secrets
                    key: DB_USERNAME
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-secrets
                    key: DB_PASSWORD

    immich:
      persistence:
        library:
          existingClaim: immich-photos

    server:
      enabled: true
      controllers:
        main:
          pod:
            nodeSelector:
              node.homelab/cpu-tier: high
            automountServiceAccountToken: false
            securityContext:
              fsGroup: 1000
          containers:
            main:
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 2Gi

    machine-learning:
      enabled: true
      controllers:
        main:
          pod:
            nodeSelector:
              node.homelab/cpu-tier: high
            automountServiceAccountToken: false
            securityContext:
              fsGroup: 1000
          containers:
            main:
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "4"
                  memory: 4Gi
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-model-cache

    valkey:
      enabled: true
